# MADGRAV conda environment.
# IMPORTANT: pin torch + CUDA to match the version the frozen weights were trained/calibrated with.
#   The CNN/CAE/glitch-arm weights are calibration-locked; a different torch/CUDA build can shift the
#   GPU forward pass and break the frozen FAR calibration. The GPU forward is the calibrated path
#   (CPU is NOT byte-identical -- allowed only for install checks via SM_ALLOW_CPU=1).
# DO NOT add ml4gw -- its whitening changes the coherence statistic and the results.
name: madgrav
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  # Frozen-weights training/calibration build: torch 1.12.1.post201, CUDA 11.2, cuDNN 8.9.0.7.
  # The GPU forward pass is the calibrated path; a different torch/CUDA build can shift it and break
  # the frozen FAR calibration. If this exact build is unavailable on your cluster, match it as
  # closely as your GPUs allow and re-validate the demo (GW190521 -> net sigma ~7.7) before trusting FARs.
  - pytorch=1.12.1
  - cudatoolkit=11.2
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - gwpy
  - gwosc
  - astropy
  - h5py
  - matplotlib
  - pip
